name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
      DEFAULT_KEY_ALIAS: qrscanner
      DEFAULT_STORE_PASSWORD: qrscanner-ci-storepass
      DEFAULT_KEY_PASSWORD: qrscanner-ci-keypass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore cached CI keystore
        uses: actions/cache@v4
        id: keystore-cache
        with:
          path: .ci-signing
          key: qr-scanner-release-keystore-v1

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "Using custom keystore from repository secrets."
          elif [ -f .ci-signing/release.keystore ]; then
            cp .ci-signing/release.keystore "$KEYSTORE_PATH"
            echo "Using cached CI release keystore."
          else
            mkdir -p .ci-signing
            keytool -genkeypair -v \
              -keystore .ci-signing/release.keystore \
              -alias "$DEFAULT_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$DEFAULT_STORE_PASSWORD" \
              -keypass "$DEFAULT_KEY_PASSWORD" \
              -dname "CN=QR Scanner, OU=Mobile, O=zapk13, C=US"
            cp .ci-signing/release.keystore "$KEYSTORE_PATH"
            echo "Generated and cached a new CI release keystore."
          fi
          test -s "$KEYSTORE_PATH"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          export ANDROID_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-$DEFAULT_STORE_PASSWORD}"
          export ANDROID_KEY_ALIAS="${ANDROID_KEY_ALIAS:-$DEFAULT_KEY_ALIAS}"
          export ANDROID_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$DEFAULT_KEY_PASSWORD}"
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-scanner-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload mapping file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 30
          if-no-files-found: ignore
