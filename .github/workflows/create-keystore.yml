name: Create release keystore

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: Keystore password (save this securely)
        required: true
        type: string
      key_password:
        description: Key password (leave blank to reuse keystore password)
        required: false
        type: string
      key_alias:
        description: Key alias
        required: true
        default: qrscanner
        type: string

jobs:
  create-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate release keystore
        env:
          STORE_PASSWORD: ${{ inputs.store_password }}
          KEY_PASSWORD: ${{ inputs.key_password }}
          KEY_ALIAS: ${{ inputs.key_alias }}
        run: |
          KEY_PASS="${KEY_PASSWORD:-$STORE_PASSWORD}"
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASS" \
            -dname "CN=QR Scanner, OU=Mobile, O=zapk13, C=US"
          base64 -w0 release.keystore > release.keystore.base64

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release.keystore
            release.keystore.base64
          retention-days: 7

      - name: Print GitHub secret names
        run: |
          echo "Download the release-keystore artifact, then add these repository secrets:"
          echo "  ANDROID_KEYSTORE_BASE64     = contents of release.keystore.base64"
          echo "  ANDROID_KEYSTORE_PASSWORD   = your keystore password"
          echo "  ANDROID_KEY_ALIAS           = ${{ inputs.key_alias }}"
          echo "  ANDROID_KEY_PASSWORD        = your key password"
          echo "After adding secrets, run Build APK again."
